<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum Bank — Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center">

<div class="card profile-card">
  <div class="profile-banner"></div>
  <div class="profile-body">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar">A</div>
      <div class="profile-name-block">
        <div class="profile-name">Deep User</div>
        <div class="profile-badge">✦ Premium</div>
      </div>
    </div>

    <div class="profile-row">
      <span class="profile-row-label">Account No.</span>
      <span class="profile-row-value" style="font-family:'Playfair Display',serif;letter-spacing:.05em;">•••• •••• 6789</span>
    </div>
    <div class="profile-row">
      <span class="profile-row-label">Email</span>
      <span class="profile-row-value">Deep@aurum.bank</span>
    </div>
    <div class="profile-row">
      <span class="profile-row-label">Member Since</span>
      <span class="profile-row-value">January 2024</span>
    </div>
    <div class="profile-row">
      <span class="profile-row-label">Status</span>
      <span class="profile-row-value" style="color:var(--green);">● Active</span>
    </div>

    <button class="btn btn-ghost" onclick="window.location.href='dashboard.html'" style="width:100%;">
      ← Back to Dashboard
    </button>
  </div>
</div>

</body>
</html>
